name: build openwa
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0" # Baut jeden Sonntag um 00:00 Uhr automatisch neu
  push:
    branches:
      - main
    paths:
      - 'gateways/openwa/**'

jobs:
  push:
    name: "yolks:openwa"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OpenWA Image
        uses: docker/build-push-action@v6
        with:
          context: ./gateways/openwa
          file: ./gateways/openwa/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/yolks:openwa
          cache-from: type=gha
          cache-to: type=gha,mode=max
